version: "3.8"

services:
  gpu-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: aisched-gpu-worker
    restart: always
    ports:
      - "${GPU_API_PORT:-9000}:9000"
    environment:
      WORKER_NAME: ${WORKER_NAME:-gpu-worker}
      SCHEDULER_URL: http://${SCHEDULER_PUBLIC_IP}:${SCHEDULER_API_PORT:-8080}
      GPU_COUNT: ${GPU_COUNT}
      GPU_MODEL: ${GPU_MODEL}
      VRAM_TOTAL_MB: ${VRAM_TOTAL_MB}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gpu_data:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - aisched-net

volumes:
  gpu_data:

networks:
  aisched-net:
    driver: bridge
