version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: aisched-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scheduler/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aisched-net

  redis:
    image: redis:7.2-alpine
    container_name: aisched-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aisched-net

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: aisched-scheduler
    restart: unless-stopped
    ports:
      - "${SCHEDULER_API_PORT:-8080}:8080"
      - "${SCHEDULER_WS_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SCHEDULER_PUBLIC_IP: ${SCHEDULER_PUBLIC_IP}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aisched-net

volumes:
  mysql_data:
  redis_data:

networks:
  aisched-net:
    driver: bridge
